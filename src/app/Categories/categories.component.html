<div class="container">
  <div class="page-header">
    <h1>Categories</h1>
    <button class="btn btn-primary" (click)="openCreate()">+ Add Category</button>
  </div>

  <div class="table-wrapper">
    <table class="table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Description</th>
          <th>Products</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let cat of categories">
          <td><strong>{{ cat.name }}</strong></td>
          <td>{{ cat.description || '—' }}</td>
          <td>{{ cat.productCount }}</td>
          <td>
            <button class="btn btn-sm btn-outline" (click)="openEdit(cat)">Edit</button>
            <button class="btn btn-sm btn-danger" (click)="delete(cat.id)">Delete</button>
          </td>
        </tr>
        <tr *ngIf="categories.length === 0">
          <td colspan="4" class="text-center text-muted">No categories found.</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Modal -->
<div class="modal-backdrop" *ngIf="showModal" (click)="showModal = false">
  <div class="modal" (click)="$event.stopPropagation()">
    <h2>{{ editingCategory ? 'Edit Category' : 'New Category' }}</h2>
    <form [formGroup]="form" (ngSubmit)="save()">
      <div class="form-group">
        <label>Name *</label>
        <input class="form-control" formControlName="name" />
      </div>
      <div class="form-group">
        <label>Description</label>
        <input class="form-control" formControlName="description" />
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-outline" (click)="showModal = false">Cancel</button>
        <button type="submit" class="btn btn-primary" [disabled]="form.invalid">
          {{ editingCategory ? 'Update' : 'Create' }}
        </button>
      </div>
    </form>
  </div>
</div>
